{% load elixir_toolkit_tags %}
{% load crispy_forms_field %}

<div class="field" data-field-id="{{ field.id_for_label }}">
    {% if field.label %}
    <label class="label" for="{{ field.id_for_label }}">
        {{ field.label }}
        {% if field.field.required %}
            <span class="asterisk">*</span>
        {% endif %}
    </label>
    {% endif %}
    <div class="control has-icons-left has-icons-right">
        {% crispy_field field 'class' 'input' %}
        <span class="icon is-small is-left">
            <i class="fas fa-lock"></i>
        </span>
        <span class="icon is-small is-right toggle-password" style="cursor: pointer; pointer-events: auto;">
            <i class="fas fa-eye"></i>
        </span>
    </div>
    
    {% if field.errors %}
        {% for error in field.errors %}
            <p class="help is-danger">{{ error }}</p>
        {% endfor %}
    {% endif %}
    {% if field.help_text %}
        <p class="help">{{ field.help_text|safe }}</p>
    {% endif %}
</div>

<script>
(function() {
    // Évite la redéfinition multiple
    if (window.PasswordToggleLoaded) return;
    window.PasswordToggleLoaded = true;

    function initPasswordToggle() {
        document.querySelectorAll('.toggle-password').forEach(toggle => {
            // Évite la double initialisation
            if (toggle.dataset.initialized) return;
            toggle.dataset.initialized = "true";

            const control = toggle.closest('.control');
            if (!control) return;

            const input = control.querySelector('input[type="password"], input[type="text"]');
            if (!input) return;

            const icon = toggle.querySelector('i');
            if (!icon) return;

            toggle.addEventListener('click', function(e) {
                e.preventDefault();
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        });
    }

    // Initialisation
    document.addEventListener('DOMContentLoaded', initPasswordToggle);
    document.body.addEventListener('htmx:afterSwap', initPasswordToggle);

    // Initialisation immédiate si le script est injecté dynamiquement
    if (document.readyState === "complete" || document.readyState === "interactive") {
        initPasswordToggle();
    }
})();
</script>
