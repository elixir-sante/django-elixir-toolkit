{% load elixir_toolkit_tags %}
{% load crispy_forms_field %}

<div class="field file-uploader" data-field-id="{{ field.id_for_label }}">
    <label class="label">{{ field.label }}</label>
    <div class="control">
        <div class="file has-name is-fullwidth {% if field.errors %}is-danger{% else %}is-primary{% endif %}">
            <label class="file-label">
                {% crispy_field field 'class' 'file-input' %}
                <span class="file-cta">
                    <span class="file-icon"><i class="fas fa-upload"></i></span>
                    <span class="file-label">Choisir...</span>
                </span>
                <span class="file-name" id="name-{{ field.id_for_label }}">Aucun fichier</span>
            </label>
        </div>
    </div>

    <div style="display: none;">
        <input type="checkbox" name="{{ field.name }}-clear" id="{{ field.id_for_label }}-clear_id">
    </div>

    <div id="list-{{ field.id_for_label }}" class="mt-2 tags"></div>
    <p class="help file-size has-text-grey" id="size-{{ field.id_for_label }}"></p>
    
    {% if field.errors %}
        {% for error in field.errors %}
            <p class="help is-danger"><strong>{{ error }}</strong></p>
        {% endfor %}
    {% endif %}
    {% if field.help_text %}<p class="help">{{ field.help_text|safe }}</p>{% endif %}
</div>

<script>
(function() {
    if (window.ElixirUploaderLoaded) return;
    window.ElixirUploaderLoaded = true;

    function initElixirUploader() {
        document.querySelectorAll('.file-uploader').forEach(container => {
            const fieldId = container.dataset.fieldId;
            
            if (container.dataset.initialized) return;
            
            const fileInput = container.querySelector('.file-input');
            const fileListDisplay = document.getElementById(`list-${fieldId}`);
            const fileNameLabel = document.getElementById(`name-${fieldId}`);
            const fileSizeContainer = document.getElementById(`size-${fieldId}`);
            const clearCheckbox = document.getElementById(`${fieldId}-clear_id`);

            if (!fileInput || !fileListDisplay) return;
            
            container.dataset.initialized = "true";
            let allFiles = new DataTransfer();

            let initialFileName = fileInput.dataset.initialName || "";

            function updateFileList(isInitial = false) {
                fileListDisplay.innerHTML = '';
                let totalSize = 0;

                if (isInitial && initialFileName) {
                    if (fileNameLabel) fileNameLabel.textContent = '1 fichier(s)';
                    
                    const fileControl = document.createElement('div');
                    fileControl.className = 'control';
                    fileControl.innerHTML = `
                        <div class="tags has-addons">
                            <a class="tag is-delete is-medium" id="clear-initial-${fieldId}"></a>
                            <span class="tag is-link is-medium">${initialFileName.substring(0, 25)}</span>
                        </div>
                    `;
                    
                    fileControl.querySelector('.is-delete').onclick = (e) => {
                        e.preventDefault();
                        initialFileName = "";
                        if (fileNameLabel) fileNameLabel.textContent = 'Aucun fichier';
                        if (clearCheckbox) clearCheckbox.checked = true; // Demande à Django d'effacer le fichier
                        updateFileList(false);
                    };
                    
                    fileListDisplay.appendChild(fileControl);
                    return;
                }

                if (!allFiles.files.length) {
                    if (fileNameLabel) fileNameLabel.textContent = 'Aucun fichier';
                    if (fileSizeContainer) fileSizeContainer.textContent = '';
                    return;
                }

                Array.from(allFiles.files).forEach((file, index) => {
                    totalSize += file.size;
                    const fileControl = document.createElement('div');
                    fileControl.className = 'control';
                    fileControl.innerHTML = `
                        <div class="tags has-addons">
                            <a class="tag is-delete is-medium" data-index="${index}"></a>
                            <span class="tag is-link is-medium">${file.name.substring(0, 25)}</span>
                        </div>
                    `;
                    fileControl.querySelector('.is-delete').onclick = (e) => {
                        e.preventDefault();
                        removeFile(index);
                    };
                    fileListDisplay.appendChild(fileControl);
                });

                if (fileNameLabel) fileNameLabel.textContent = `${allFiles.files.length} fichier(s)`;
                if (fileSizeContainer) {
                    fileSizeContainer.textContent = `Taille : ${(totalSize / (1024 * 1024)).toFixed(2)} Mo`;
                }
            }

            function removeFile(index) {
                const dt = new DataTransfer();
                Array.from(allFiles.files).forEach((file, i) => {
                    if (i !== index) dt.items.add(file);
                });
                allFiles = dt;
                fileInput.files = allFiles.files;
                updateFileList(false);
            }

            fileInput.addEventListener('change', function() {
                initialFileName = "";
                if (clearCheckbox) clearCheckbox.checked = false;

                if (this.multiple) {
                    Array.from(this.files).forEach(file => allFiles.items.add(file));
                } else {
                    allFiles = new DataTransfer();
                    if (this.files.length) allFiles.items.add(this.files[0]);
                }
                this.files = allFiles.files;
                updateFileList(false);
            });
            updateFileList(true);
        });
    }

    document.addEventListener('DOMContentLoaded', initElixirUploader);
    document.body.addEventListener('htmx:afterSwap', initElixirUploader);
    
    if (document.readyState === "complete" || document.readyState === "interactive") {
        initElixirUploader();
    }
})();
</script>
