[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "django-elixir-toolkit"
version = "0.1.0"
description = "UI Components Toolkit for Django based on Bulma"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "django>=4.2",
]

[tool.setuptools.packages.find]
include = ["elixir_toolkit*"] # On n'inclut que le dossier du toolkit